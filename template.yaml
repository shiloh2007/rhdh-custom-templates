apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deep-learning-starter
  title: Deep Learning Model Starter
  description: A basic template to initialize a new neural network workspace.
  tags:
    - python
    - ai
spec:
  owner: user:guest
  type: service

  # 1. PARAMETERS: This builds the UI form the user will see.
  parameters:
    - title: Model Information
      required:
        - model_name
      properties:
        model_name:
          title: Model Name
          type: string
          description: The name of your new deep learning model.
          ui:autofocus: true

  # 2. STEPS: The actions the hub performs after the form is submitted.
  steps:
    - id: log-step
      name: Log Model Creation
      action: debug:log
      input:
        message: "Starting setup for the ${{ parameters.model_name }} deep learning model!"
